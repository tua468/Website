<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="https://smkn2sragen.sch.id/twosra-iot/assets/img/profile-img.png" />
  <title>Info &amp; Pengumuman — SMK Negeri 2 Sragen</title>
  <meta name="description" content="Pengumuman resmi, jadwal PPDB, dan informasi penting langsung dari SMK Negeri 2 Sragen, Kabupaten Sragen." />
  <meta property="og:type"         content="website" />
  <meta property="og:site_name"    content="SMK Negeri 2 Sragen" />
  <meta property="og:title"        content="Info &amp; Pengumuman — SMK Negeri 2 Sragen" />
  <meta property="og:description"  content="Pengumuman resmi, jadwal PPDB, dan informasi penting langsung dari SMK Negeri 2 Sragen, Kabupaten Sragen." />
  <meta property="og:image"        content="https://raw.githubusercontent.com/l63666365-ops/Foto/refs/heads/main/plang-smk-1-scaled.jpg" />
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Info &amp; Pengumuman — SMK Negeri 2 Sragen" />
  <meta name="twitter:description" content="Pengumuman resmi, jadwal PPDB, dan informasi penting langsung dari SMK Negeri 2 Sragen, Kabupaten Sragen." />
  <meta name="twitter:image"       content="https://raw.githubusercontent.com/l63666365-ops/Foto/refs/heads/main/plang-smk-1-scaled.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: var(--gray-1); }
    /* pengumuman pakai layout lebih sempit */
    .container, .nav-inner { max-width: 860px; }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, var(--navy-dk) 0%, var(--navy) 60%, var(--navy-lt) 100%);
      padding: 52px 0 44px;
    }
    .hero h1 { font-size: clamp(1.7rem, 4vw, 2.4rem); margin-bottom: 10px; }
    .hero p  { font-size: 14.5px; color: rgba(255,255,255,.75); max-width: 500px; }
    .hero-stats { gap: 32px; margin-top: 24px; }
    .hero-stat-num { font-size: 1.8rem; }

    /* filter overrides (ukuran sedikit lebih kecil) */
    .filter-btn   { padding: 6px 16px; font-size: 12px; }
    .filter-count { font-size: 12px; }

    /* ── MAIN ── */
    .main { padding: 36px 0 80px; }

    /* Kartu pengumuman utama (highlighted) */
    .pcard-main {
      background: linear-gradient(135deg, var(--navy-dk), var(--navy));
      border-radius: var(--r-xl); padding: 28px 30px;
      display: flex; align-items: flex-start; gap: 18px;
      margin-bottom: 12px; cursor: pointer; position: relative; overflow: hidden;
      transition: transform .2s, box-shadow .2s;
    }
    .pcard-main:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(26,53,102,.3); }
    .pcard-main::before {
      content: ''; position: absolute; right: -20px; top: -20px;
      width: 120px; height: 120px; border-radius: 50%;
      background: rgba(255,255,255,.05);
    }
    .pcard-main-ico {
      width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0;
      background: rgba(255,255,255,.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: var(--gold-lt);
    }
    .pcard-main-body { flex: 1; min-width: 0; }
    .pcard-main-tag { font-size: 9.5px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-lt); margin-bottom: 5px; }
    .pcard-main-title { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.45; margin-bottom: 5px; }
    .pcard-main-snippet { font-size: 12.5px; color: rgba(255,255,255,.72); line-height: 1.65; margin-bottom: 8px; }
    .pcard-main-date { font-size: 11.5px; color: rgba(255,255,255,.55); }
    .pcard-main-arrow { color: rgba(255,255,255,.5); font-size: 14px; flex-shrink: 0; margin-top: 4px; }

    /* Kartu pengumuman biasa */
    .pcard {
      background: var(--white); border: 1px solid var(--gray-2);
      border-radius: var(--r-lg); padding: 18px 20px;
      display: flex; align-items: flex-start; gap: 14px;
      margin-bottom: 10px; cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .2s;
    }
    .pcard:hover { border-color: var(--navy); box-shadow: 0 4px 16px rgba(26,53,102,.1); transform: translateX(4px); }
    .pcard-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: var(--navy); margin-top: 6px;
    }
    .pcard-dot.ppdb    { background: #e8a020; box-shadow: 0 0 0 3px rgba(232,160,32,.2); }
    .pcard-dot.merah   { background: #e53e3e; box-shadow: 0 0 0 3px rgba(229,62,62,.2); }
    .pcard-body { flex: 1; min-width: 0; }
    .pcard-top { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; flex-wrap: wrap; }
    .pcard-badge {
      font-size: 9.5px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
      padding: 2px 9px; border-radius: 100px; white-space: nowrap;
    }
    .pcard-badge.ppdb         { background: #fff3cd; color: #856404; }
    .pcard-badge.kesiswaan    { background: var(--navy-dim); color: var(--navy); }
    .pcard-badge.administrasi { background: #e8f5e9; color: #2e7d32; }
    .pcard-badge.akademik     { background: #e3f2fd; color: #1565c0; }
    .pcard-badge.umum         { background: var(--gray-2); color: var(--text-2); }
    .pcard-status {
      font-size: 9.5px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      padding: 2px 9px; border-radius: 100px;
      background: #d4edda; color: #155724; white-space: nowrap;
    }
    .pcard-title { font-size: 13.5px; font-weight: 700; color: var(--text-1); line-height: 1.5; margin-bottom: 4px; }
    .pcard-snippet {
      font-size: 12px; color: var(--text-2); line-height: 1.6; margin-bottom: 5px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .pcard-date { font-size: 11px; color: var(--text-3); }
    .pcard-arrow { color: var(--text-3); font-size: 11px; flex-shrink: 0; margin-top: 6px; }

    /* Loading */
    .loading-state { text-align: center; padding: 60px 0; color: var(--text-3); font-size: 14px; }
    .loading-state i { font-size: 2rem; margin-bottom: 12px; display: block; }
    .empty-state { text-align: center; padding: 60px 0; color: var(--text-3); }
    .empty-state i { font-size: 2rem; margin-bottom: 12px; display: block; }

    @media (max-width: 540px) {
      .pcard-main { flex-direction: column; gap: 12px; }
      .filter-inner { gap: 7px; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon"><img src="https://smkn2sragen.sch.id/twosra-iot/assets/img/profile-img.png" alt="Logo" /></div>
      <div>
        <div class="nav-logo-name">SMK Negeri 2 Sragen</div>
        <span class="nav-logo-sub">Kabupaten Sragen · Jawa Tengah</span>
      </div>
    </a>
    <a href="index.html#pengumuman" class="nav-back"><i class="fas fa-arrow-left"></i> Kembali</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="container hero-inner">
    <div class="hero-tag"><i class="fas fa-bullhorn"></i> Info & Pengumuman</div>
    <h1>Semua Info &amp;<br>Pengumuman Sekolah</h1>
    <p>Pengumuman resmi, PPDB, jadwal, dan informasi penting langsung dari SMK Negeri 2 Sragen.</p>
    <div class="hero-stats">
      <div>
        <div class="hero-stat-num" id="stat-total">—</div>
        <div class="hero-stat-lbl">Total Pengumuman</div>
      </div>
      <div>
        <div class="hero-stat-num" id="stat-aktif">—</div>
        <div class="hero-stat-lbl">Aktif</div>
      </div>
    </div>
  </div>
</section>

<!-- FILTER -->
<div class="filter-bar">
  <div class="container">
    <div class="filter-inner">
      <span class="filter-label"><i class="fas fa-filter"></i> Filter:</span>
      <button class="filter-btn active" data-filter="Semua">Semua</button>
      <button class="filter-btn" data-filter="PPDB">PPDB</button>
      <button class="filter-btn" data-filter="Akademik">Akademik</button>
      <button class="filter-btn" data-filter="Kesiswaan">Kesiswaan</button>
      <button class="filter-btn" data-filter="Administrasi">Administrasi</button>
      <button class="filter-btn" data-filter="Umum">Umum</button>
      <span class="filter-count">Menampilkan <strong id="count-display">0</strong> info</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<main class="main">
  <div class="container">
    <div id="content-area">
      <div class="loading-state"><i class="fas fa-spinner fa-spin"></i>Memuat pengumuman...</div>
    </div>
  </div>
</main>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, onSnapshot }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const app = initializeApp({
    apiKey:            "AIzaSyAvkyQXtfQ3d4pfYxnOEuk1sq8QWArzWXY",
    authDomain:        "smkn2sragen-e487b.firebaseapp.com",
    projectId:         "smkn2sragen-e487b",
    storageBucket:     "smkn2sragen-e487b.firebasestorage.app",
    messagingSenderId: "602192129071",
    appId:             "1:602192129071:web:884e02ba2bd6766df22ada"
  });
  const db = getFirestore(app);

  let allData = [];
  let activeFilter = 'Semua';

  const badgeClass = kat => {
    const k = (kat||'').toLowerCase();
    if (k === 'ppdb') return 'ppdb';
    if (k === 'kesiswaan') return 'kesiswaan';
    if (k === 'administrasi') return 'administrasi';
    if (k === 'akademik') return 'akademik';
    return 'umum';
  };

  const dotClass = kat => {
    const k = (kat||'').toLowerCase();
    if (k === 'ppdb') return 'ppdb';
    return '';
  };

  function goDetail(id) {
    window.location.href = `detail.html?section=pengumuman&id=${id}&from=pengumuman`;
  }
  window.goDetail = goDetail;

  function render() {
    const area = document.getElementById('content-area');
    const filtered = activeFilter === 'Semua'
      ? allData
      : allData.filter(d => d.kategori === activeFilter);

    document.getElementById('count-display').textContent = filtered.length;

    if (!filtered.length) {
      area.innerHTML = `<div class="empty-state"><i class="fas fa-search"></i><p>Tidak ada pengumuman untuk kategori "<strong>${activeFilter}</strong>".</p></div>`;
      return;
    }

    const snippetOf = d => (d.isi||'').split(/\\n|\n/)[0].slice(0, 100) + ((d.isi||'').length > 100 ? '...' : '');

    const [top, ...rest] = filtered;

    area.innerHTML = `
      <div class="pcard-main" onclick="goDetail('${top.id}')">
        <div class="pcard-main-ico"><i class="fas fa-bullhorn"></i></div>
        <div class="pcard-main-body">
          <div class="pcard-main-tag">🔥 Terbaru · ${top.kategori||''}</div>
          <div class="pcard-main-title">${top.judul||''}</div>
          <div class="pcard-main-snippet">${snippetOf(top)}</div>
          <div class="pcard-main-date"><i class="fas fa-calendar-alt"></i> ${top.tanggal||''}</div>
        </div>
        <i class="fas fa-chevron-right pcard-main-arrow"></i>
      </div>
      ${rest.map(d => `
      <div class="pcard" onclick="goDetail('${d.id}')">
        <div class="pcard-dot ${dotClass(d.kategori)}"></div>
        <div class="pcard-body">
          <div class="pcard-top">
            <span class="pcard-badge ${badgeClass(d.kategori)}">${d.kategori||''}</span>
            <span class="pcard-status">${d.status||'Aktif'}</span>
          </div>
          <div class="pcard-title">${d.judul||''}</div>
          <div class="pcard-snippet">${snippetOf(d)}</div>
          <div class="pcard-date"><i class="fas fa-calendar-alt"></i> ${d.tanggal||''}</div>
        </div>
        <i class="fas fa-chevron-right pcard-arrow"></i>
      </div>`).join('')}`;
  }

  onSnapshot(collection(db, 'pengumuman'), snap => {
    allData = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .filter(d => d.status === 'Aktif')
      .sort((a, b) => (b.tanggal||'').localeCompare(a.tanggal||''));

    document.getElementById('stat-total').textContent = allData.length;
    document.getElementById('stat-aktif').textContent = allData.filter(d => d.status === 'Aktif').length;
    render();
  }, err => {
    document.getElementById('content-area').innerHTML =
      `<div class="loading-state" style="color:#e53e3e;"><i class="fas fa-exclamation-circle"></i>Gagal memuat: ${err.message}</div>`;
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      render();
      document.querySelector('.main').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
</script>

</body>
</html>
