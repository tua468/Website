<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="https://smkn2sragen.sch.id/twosra-iot/assets/img/profile-img.png" />
  <title>Admin Login — SMK Negeri 2 Sragen</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #1a3566;
      --navy-dk: #122448;
      --navy-lt: #2451a0;
      --gold:    #e8a020;
      --gold-lt: #f5c842;
      --white:   #ffffff;
      --gray-1:  #f7f8fc;
      --gray-2:  #eef0f6;
      --gray-3:  #d1d5e0;
      --text-1:  #0f1a35;
      --text-2:  #4a5578;
      --text-3:  #8a94b8;
      --sans: 'Plus Jakarta Sans', system-ui, sans-serif;
      --r-md: 16px; --r-lg: 24px; --r-xl: 32px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--sans);
      background: linear-gradient(135deg, var(--navy-dk) 0%, var(--navy) 50%, var(--navy-lt) 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }

    /* Background pattern */
    body::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,.06) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    body::after {
      content: '';
      position: absolute; inset: 0;
      background: url('https://raw.githubusercontent.com/l63666365-ops/Foto/refs/heads/main/plang-smk-1-scaled.jpg') center/cover no-repeat;
      opacity: .07;
    }

    /* Floating shapes */
    .shape {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,.04);
      animation: float 8s ease-in-out infinite;
    }
    .shape-1 { width: 300px; height: 300px; top: -80px; right: -80px; animation-delay: 0s; }
    .shape-2 { width: 200px; height: 200px; bottom: -60px; left: -60px; animation-delay: 3s; }
    .shape-3 { width: 120px; height: 120px; top: 40%; left: 8%; animation-delay: 1.5s; }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }

    /* Card */
    .login-wrap {
      position: relative; z-index: 2;
      width: 100%; max-width: 440px;
      padding: 0 20px;
    }

    /* Logo area */
    .login-logo {
      display: flex; align-items: center; gap: 12px;
      justify-content: center; margin-bottom: 32px;
    }
    .login-logo-icon {
      width: 52px; height: 52px; border-radius: 12px;
      overflow: hidden; background: rgba(255,255,255,.15);
      display: flex; align-items: center; justify-content: center;
    }
    .login-logo-icon img { width: 100%; height: 100%; object-fit: contain; }
    .login-logo-text { color: #fff; }
    .login-logo-text .name { font-size: 15px; font-weight: 700; line-height: 1.3; }
    .login-logo-text .sub { font-size: 11px; color: rgba(255,255,255,.6); }

    .login-card {
      background: rgba(255,255,255,.97);
      border-radius: var(--r-xl);
      padding: 40px 36px;
      box-shadow: 0 32px 80px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.1);
    }

    .login-card-header { text-align: center; margin-bottom: 32px; }
    .login-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(26,53,102,.08); color: var(--navy);
      font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      padding: 4px 14px; border-radius: 100px; margin-bottom: 12px;
    }
    .login-badge i { font-size: 8px; color: var(--gold); }
    .login-card-header h1 { font-size: 22px; font-weight: 800; color: var(--text-1); margin-bottom: 6px; }
    .login-card-header p { font-size: 13.5px; color: var(--text-3); }

    /* Form */
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block; font-size: 12px; font-weight: 700;
      color: var(--text-2); margin-bottom: 8px; letter-spacing: .5px;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: 14px; color: var(--text-3);
      transition: color .2s;
    }
    .form-input {
      width: 100%; padding: 13px 14px 13px 42px;
      border: 1.5px solid var(--gray-3); border-radius: var(--r-md);
      font-family: var(--sans); font-size: 14px; color: var(--text-1);
      background: var(--gray-1);
      outline: none; transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .form-input:focus {
      border-color: var(--navy); background: var(--white);
      box-shadow: 0 0 0 3px rgba(26,53,102,.1);
    }
    .form-input:focus + .input-icon-right,
    .input-wrap:focus-within .input-icon { color: var(--navy); }

    .input-icon-right {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-size: 14px; color: var(--text-3); cursor: pointer;
      transition: color .2s; background: none; border: none; padding: 0;
    }
    .input-icon-right:hover { color: var(--navy); }

    /* Error */
    .form-error {
      display: none; align-items: center; gap: 6px;
      background: #fff5f5; border: 1px solid #fed7d7; border-radius: 10px;
      padding: 10px 14px; margin-bottom: 20px;
      font-size: 12.5px; color: #c53030;
    }
    .form-error.show { display: flex; }
    .form-error i { font-size: 13px; flex-shrink: 0; }

    /* Submit */
    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--navy), var(--navy-lt));
      color: #fff; border: none; border-radius: var(--r-md);
      font-family: var(--sans); font-size: 14.5px; font-weight: 700;
      cursor: pointer; letter-spacing: .5px;
      transition: opacity .2s, transform .2s, box-shadow .2s;
      box-shadow: 0 6px 20px rgba(26,53,102,.35);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { opacity: .92; transform: translateY(-1px); box-shadow: 0 10px 28px rgba(26,53,102,.4); }
    .btn-login:active { transform: translateY(0); }
    .btn-login.loading { pointer-events: none; }
    .btn-login.loading .btn-text { display: none; }
    .btn-login .btn-loader { display: none; }
    .btn-login.loading .btn-loader { display: flex; align-items: center; gap: 8px; }

    /* Spinner */
    .spinner {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer hint */
    .login-footer {
      text-align: center; margin-top: 20px;
    }
    .login-footer a {
      font-size: 12.5px; color: rgba(255,255,255,.65);
      text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
      transition: color .2s;
    }
    .login-footer a:hover { color: #fff; }

    /* Credential hint (remove in production) */
    .cred-hint {
      background: rgba(232,160,32,.15); border: 1px solid rgba(232,160,32,.3);
      border-radius: 10px; padding: 10px 14px; margin-bottom: 20px;
      font-size: 12px; color: var(--text-2); line-height: 1.6;
    }
    .cred-hint strong { color: var(--navy); }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="shape shape-3"></div>

  <div class="login-wrap">
    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo-icon">
        <img src="https://smkn2sragen.sch.id/twosra-iot/assets/img/profile-img.png" alt="Logo SMKN 2 Sragen" />
      </div>
      <div class="login-logo-text">
        <div class="name">SMK Negeri 2 Sragen</div>
        <div class="sub">Kabupaten Sragen · Jawa Tengah</div>
      </div>
    </div>

    <!-- Card -->
    <div class="login-card">
      <div class="login-card-header">
        <div class="login-badge"><i class="fas fa-circle"></i> Panel Admin</div>
        <h1>Masuk ke Dashboard</h1>
        <p>Kelola konten website SMKN 2 Sragen</p>
      </div>



      <!-- Error message -->
      <div class="form-error" id="formError">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorMsg">Email atau password salah. Coba lagi.</span>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="email">Alamat Email</label>
          <div class="input-wrap">
            <i class="fas fa-envelope input-icon"></i>
            <input
              type="email" id="email" name="email"
              class="form-input" placeholder="admin@smkn2sragen.sch.id"
              autocomplete="email" required
            />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input
              type="password" id="password" name="password"
              class="form-input" placeholder="Masukkan password"
              autocomplete="current-password" required
            />
            <button type="button" class="input-icon-right" id="togglePass" onclick="togglePassword()">
              <i class="fas fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Masuk ke Dashboard</span>
          <span class="btn-loader">
            <div class="spinner"></div> Memverifikasi...
          </span>
        </button>
      </form>
    </div>

    <!-- Back link -->
    <div class="login-footer">
      <a href="index.html"><i class="fas fa-arrow-left"></i> Kembali ke Website</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyAvkyQXtfQ3d4pfYxnOEuk1sq8QWArzWXY",
      authDomain: "smkn2sragen-e487b.firebaseapp.com",
      projectId: "smkn2sragen-e487b",
      storageBucket: "smkn2sragen-e487b.firebasestorage.app",
      messagingSenderId: "602192129071",
      appId: "1:602192129071:web:884e02ba2bd6766df22ada"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Kalau sudah login → langsung ke dashboard
    onAuthStateChanged(auth, user => {
      if (user) window.location.href = 'dashboard.html';
    });

    // Toggle password
    window.togglePassword = function() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
      }
    };

    function showError(msg) {
      const el = document.getElementById('formError');
      document.getElementById('errorMsg').textContent = msg;
      el.classList.add('show');
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = 'shake .4s ease';
    }

    function hideError() {
      document.getElementById('formError').classList.remove('show');
    }

    // Reset border on input
    ['email','password'].forEach(id => {
      document.getElementById(id).addEventListener('input', hideError);
    });

    // Handle login pakai Firebase Auth
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');

      if (!email)    { showError('Email tidak boleh kosong.'); return; }
      if (!password) { showError('Password tidak boleh kosong.'); return; }

      btn.classList.add('loading');

      try {
        await signInWithEmailAndPassword(auth, email, password);
        // onAuthStateChanged akan otomatis redirect ke dashboard
      } catch (err) {
        btn.classList.remove('loading');
        let msg = 'Email atau password salah. Periksa kembali.';
        if (err.code === 'auth/too-many-requests') msg = 'Terlalu banyak percobaan. Coba lagi nanti.';
        if (err.code === 'auth/invalid-email')     msg = 'Format email tidak valid.';
        showError(msg);
        document.getElementById('email').style.borderColor    = '#e53e3e';
        document.getElementById('password').style.borderColor = '#e53e3e';
        setTimeout(() => {
          document.getElementById('email').style.borderColor    = '';
          document.getElementById('password').style.borderColor = '';
        }, 1500);
      }
    });
  </script>

  <style>
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-5px); }
      80%       { transform: translateX(5px); }
    }
  </style>
</body>
</html>
